name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typecheck-and-build:
    name: Typecheck + cross-browser build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: extension
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (Chromium + Firefox)
        run: npm run build

      - name: Verify build outputs
        run: |
          test -f dist/chromium/manifest.json || (echo "missing chromium manifest" && exit 1)
          test -f dist/chromium/background.js || (echo "missing chromium background" && exit 1)
          test -f dist/chromium/content.js || (echo "missing chromium content" && exit 1)
          test -f dist/chromium/popup/index.html || (echo "missing chromium popup" && exit 1)
          test -f dist/firefox/manifest.json || (echo "missing firefox manifest" && exit 1)
          test -f dist/firefox/background.js || (echo "missing firefox background" && exit 1)
          test -f dist/firefox/content.js || (echo "missing firefox content" && exit 1)
          test -f dist/firefox/popup/index.html || (echo "missing firefox popup" && exit 1)
          echo "✓ all expected build artefacts present"

      - name: Upload chromium build
        uses: actions/upload-artifact@v4
        with:
          name: cursor-thief-chromium-${{ github.sha }}
          path: extension/dist/chromium
          retention-days: 14

      - name: Upload firefox build
        uses: actions/upload-artifact@v4
        with:
          name: cursor-thief-firefox-${{ github.sha }}
          path: extension/dist/firefox
          retention-days: 14
